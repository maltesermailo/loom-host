[workspace]
resolver = "2"
members = [
    "loom-proto",
    "loom-capture",
    "loom-encode",
    "loom-audio",
    "loom-input",
    "loom-vdisplay",
    "loomd",
    "tools/latency-probe",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
thiserror = "1"
ciborium = "0.2"
half = "2"
serde_json = "1"
hex = "0.4"
